name: Sync to Hugging Face Space

# Mirrors GitHub main to the HF Space git remote on every push.
# Requires HF_TOKEN secret (a Hugging Face write token for the space owner).
# Add it at: Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so force-push preserves commits
          lfs: true        # large model weights are tracked via Git LFS

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git remote add hf https://TarunSadarla2606:${HF_TOKEN}@huggingface.co/spaces/TarunSadarla2606/fetal-head-clinical-ai-api
          git push hf HEAD:main --force
